<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
     <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-student.html">Add Student</a>
        <a href="view-student.html">View Student</a>
        <a href="logout.html">Logout</a>

    </nav><br>
   <form id="studentForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="rollno" placeholder="Roll No" required>
    <input type="text" id="branch" placeholder="Branch" required>
    <input type="number" step="0.01" id="cgpa" placeholder="CGPA" required>
    <button type="submit">Add Student</button>
</form>

<script>
document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault();

    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.push({
        name: document.getElementById("name").value,
        rollno: document.getElementById("rollno").value,
        branch: document.getElementById("branch").value,
        cgpa: document.getElementById("cgpa").value
    });

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student Added");
});
</script>
    
</body>
</html>
